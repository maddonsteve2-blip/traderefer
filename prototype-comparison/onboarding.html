<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Welcome to TradeRefer - Let's Get Started</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f97415",
                        "background-light": "#fcfcfc",
                        "zinc-900": "#111111",
                        "border-zinc": "#e5e5e5",
                        "high-contrast": "#000000"
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                    },
                    borderRadius: {
                        "card": "24px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            overflow: hidden;
            font-size: 16px;
        }
        .authority-title {
            letter-spacing: -0.03em;
            line-height: 1;
        }
        .onboarding-grid {
            background-color: #fcfcfc;
            background-image: radial-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
</head>
<body class="bg-background-light text-zinc-900 h-screen flex flex-col onboarding-grid overflow-hidden">

    <!-- Stepper Header -->
    <header class="h-24 px-12 flex items-center justify-between border-b-2 border-zinc-100 bg-white/80 backdrop-blur-md relative z-10 shrink-0">
        <div class="flex items-center gap-3">
            <img src="logo-dark.png" alt="" class="h-8 w-auto">
            <span class="text-lg font-black tracking-tight leading-none uppercase"><span class="text-zinc-900">TRADE</span><span class="text-primary font-black">REFER</span></span>
        </div>
        <div class="flex gap-4">
            <div class="size-3 rounded-full bg-primary shadow-lg shadow-primary/20"></div>
            <div class="size-3 rounded-full bg-zinc-200"></div>
            <div class="size-3 rounded-full bg-zinc-200"></div>
            <div class="size-3 rounded-full bg-zinc-200"></div>
        </div>
        <button class="text-xs font-black uppercase text-zinc-400 hover:text-zinc-900 transition-colors tracking-widest leading-none">Save & Exit</button>
    </header>

    <main class="flex-1 flex items-center justify-center p-8 overflow-y-auto no-scrollbar">
        <div class="max-w-4xl w-full space-y-16">
            <div class="text-center space-y-6">
                 <h1 class="text-6xl md:text-7xl font-black authority-title uppercase tracking-tighter leading-tight text-high-contrast">What is your<br>primary trade?</h1>
                 <p class="text-xl font-bold text-zinc-500 max-w-xl mx-auto leading-relaxed">Select the core service your business provides. This helps us match you with the right referrers.</p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                <!-- Trade Option -->
                <button class="bg-white border-2 border-zinc-100 rounded-[40px] p-10 shadow-xl transition-all hover:border-primary hover:scale-105 group text-center space-y-4">
                    <div class="size-20 rounded-3xl bg-zinc-50 mx-auto flex items-center justify-center text-zinc-400 group-hover:text-primary transition-colors shadow-inner">
                        <span class="material-symbols-outlined !text-4xl">plumbing</span>
                    </div>
                    <span class="block text-xl font-black text-high-contrast uppercase tracking-tighter">Plumbing</span>
                </button>

                <!-- Trade Option -->
                <button class="bg-white border-2 border-zinc-100 rounded-[40px] p-10 shadow-xl transition-all hover:border-primary hover:scale-105 group text-center space-y-4">
                    <div class="size-20 rounded-3xl bg-zinc-50 mx-auto flex items-center justify-center text-zinc-400 group-hover:text-primary transition-colors shadow-inner text-primary ring-4 ring-primary/20">
                         <span class="material-symbols-outlined !text-4xl text-primary font-black">bolt</span>
                    </div>
                    <span class="block text-xl font-black text-primary uppercase tracking-tighter">Electrical</span>
                </button>

                 <!-- Trade Option -->
                <button class="bg-white border-2 border-zinc-100 rounded-[40px] p-10 shadow-xl transition-all hover:border-primary hover:scale-105 group text-center space-y-4">
                    <div class="size-20 rounded-3xl bg-zinc-50 mx-auto flex items-center justify-center text-zinc-400 group-hover:text-primary transition-colors shadow-inner">
                        <span class="material-symbols-outlined !text-4xl">carpenter</span>
                    </div>
                    <span class="block text-xl font-black text-high-contrast uppercase tracking-tighter">Carpentry</span>
                </button>

                <!-- Trade Option -->
                <button class="bg-white border-2 border-zinc-100 rounded-[40px] p-10 shadow-xl transition-all hover:border-primary hover:scale-105 group text-center space-y-4">
                    <div class="size-20 rounded-3xl bg-zinc-50 mx-auto flex items-center justify-center text-zinc-400 group-hover:text-primary transition-colors shadow-inner">
                        <span class="material-symbols-outlined !text-4xl">format_paint</span>
                    </div>
                    <span class="block text-xl font-black text-high-contrast uppercase tracking-tighter">Painting</span>
                </button>

                 <!-- Trade Option -->
                <button class="bg-white border-2 border-zinc-100 rounded-[40px] p-10 shadow-xl transition-all hover:border-primary hover:scale-105 group text-center space-y-4">
                    <div class="size-20 rounded-3xl bg-zinc-50 mx-auto flex items-center justify-center text-zinc-400 group-hover:text-primary transition-colors shadow-inner">
                        <span class="material-symbols-outlined !text-4xl">grass</span>
                    </div>
                    <span class="block text-xl font-black text-high-contrast uppercase tracking-tighter">Landscaping</span>
                </button>

                 <!-- Trade Option -->
                <button class="bg-white border-2 border-zinc-100 rounded-[40px] p-10 shadow-xl transition-all hover:border-primary hover:scale-105 group text-center space-y-4">
                    <div class="size-20 rounded-3xl bg-zinc-50 mx-auto flex items-center justify-center text-zinc-400 group-hover:text-primary transition-colors shadow-inner">
                        <span class="material-symbols-outlined !text-4xl">more_horiz</span>
                    </div>
                    <span class="block text-xl font-black text-high-contrast uppercase tracking-tighter">Other Trade</span>
                </button>
            </div>

            <div class="pt-10 flex justify-between items-center bg-white/50 p-10 rounded-[48px] border-2 border-zinc-100">
                <button class="px-10 py-5 rounded-2xl text-xs font-black uppercase tracking-widest text-zinc-400 hover:text-zinc-900 transition-colors">Go Back</button>
                <button class="bg-primary px-16 py-6 rounded-[32px] text-white text-base font-black uppercase tracking-[0.2em] shadow-3xl hover:scale-105 active:scale-95 transition-all">Next Step: Details</button>
            </div>
        </div>
    </main>

</body>
</html>
